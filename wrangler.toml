name = "swyxdotio"
account_id = "2d017c943ff16e4c52783635ef05e535"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

# Deploy as a Cloudflare Worker with Static Assets (not Pages) so we keep access
# to the full Workers platform: Durable Objects, Queues, Cron Triggers, KV, D1, R2.
# The adapter-cloudflare build emits both `_worker.js` (SSR) and the static assets
# into .svelte-kit/cloudflare; the platform serves assets first, then falls back to
# the worker for dynamic/SSR routes.
main = ".svelte-kit/cloudflare/_worker.js"

[vars]
GA4_MEASUREMENT_ID = "G-TW6GTQ9Q4N"

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[version_metadata]
binding = "CF_VERSION_METADATA"

[secrets]
required = ["GH_TOKEN", "PODCAST_ADMIN_PASSWORD", "PODCAST_ADMIN_SESSION_SECRET", "GA4_API_SECRET"]

[[kv_namespaces]]
binding = "CONTENT_MANIFEST"
id = "b1c7b0dfb8ed438998b7850a2293368a"

[[d1_databases]]
binding = "READ_COUNTERS"
database_name = "swyxdotio-read-counters"
database_id = "9990fd0c-2211-4bf4-b263-ddbb8aaed34e"
migrations_dir = "migrations/read-counters"

[[r2_buckets]]
binding = "PODCAST_MEDIA"
bucket_name = "swyxdotio-podcast-media"

# Example bindings for future use (uncomment + configure when needed):
# [[durable_objects.bindings]]
# name = "MY_DO"
# class_name = "MyDurableObject"
#
# [[migrations]]
# tag = "v1"
# new_classes = ["MyDurableObject"]
