name = "swyxdotio"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Deploy as a Cloudflare Worker with Static Assets (not Pages) so we keep access
# to the full Workers platform: Durable Objects, Queues, Cron Triggers, KV, D1, R2.
# The adapter-cloudflare build emits both `_worker.js` (SSR) and the static assets
# into .svelte-kit/cloudflare; the platform serves assets first, then falls back to
# the worker for dynamic/SSR routes.
main = ".svelte-kit/cloudflare/_worker.js"

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

# Example bindings for future use (uncomment + configure when needed):
# [[durable_objects.bindings]]
# name = "MY_DO"
# class_name = "MyDurableObject"
#
# [[migrations]]
# tag = "v1"
# new_classes = ["MyDurableObject"]
